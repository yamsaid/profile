<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="wrapper">
      <header>
        {% if site.logo %}
          <img src="{{site.logo | relative_url}}" alt="Logo" />
        {% endif %}

        <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>

        <p>{{ site.description | default: site.github.project_tagline }}</p>

        <!-- Tu peux ajouter ici des liens personnalisés (ex: vers GitHub, LinkedIn) -->
        <!-- Exemple :
        <p>
          <a href="https://github.com/ton-compte">GitHub</a><br>
          <a href="https://linkedin.com/in/ton-profil">LinkedIn</a>
        </p>
        -->
      </header>
      <section>

      {{ content }}

      </section>
      <footer>
        <!-- Le footer est vide pour ne rien afficher. Tu peux y mettre un message personnalisé si tu veux. -->
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
